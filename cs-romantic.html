<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romantic Partner — Conversation Starters</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --aqua:       #a3d0c9;
      --aqua-deep:  #6bada3;
      --aqua-soft:  rgba(163,208,201,0.14);
      --linen:      #FAF8F5;
      --card:       #FFFFFF;
      --slate-plum: #3A3353;
      --muted:      #7A7090;
      --border:     #EAE6F0;
      --spicy:      #8B4B7A;
      --font-sans:  'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--linen);
      color: var(--slate-plum);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--slate-plum);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.12s;
    }
    .back-btn:hover { color: #fff; }
    .header-sep { color: rgba(255,255,255,0.25); font-size: 13px; }
    .header-label { font-size: 13px; font-weight: 600; color: var(--aqua); }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      padding: 36px 24px 64px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--slate-plum);
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── LEVEL PICKER ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .level-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .level-pill {
      padding: 8px 20px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .level-pill:hover { border-color: var(--aqua-deep); color: var(--slate-plum); }
    .level-pill.active { background: var(--slate-plum); border-color: var(--slate-plum); color: #fff; }
    .level-pill.spicy.active { background: var(--spicy); border-color: var(--spicy); }

    /* ── LEVEL DESC ── */
    .level-desc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 24px;
      display: none;
    }
    .level-desc.visible { display: block; }

    /* ── ACTIONS ROW ── */
    .actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .count-text { font-size: 12px; color: var(--muted); }
    .shuffle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--aqua);
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--slate-plum);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .shuffle-btn:hover { opacity: 0.85; }

    /* ── QUESTION CARDS ── */
    .questions-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .q-num {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--aqua-deep);
      margin-bottom: 7px;
    }
    .q-text {
      font-size: 15px;
      color: var(--slate-plum);
      line-height: 1.65;
      font-weight: 500;
    }

    /* ── CONTAINER TIP ── */
    .container-tip {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--aqua);
      border-radius: 0 10px 10px 0;
      padding: 14px 18px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      display: none;
    }
    .container-tip.visible { display: block; }
    .container-tip strong { color: var(--slate-plum); }

    /* ── EMPTY STATE ── */
    #empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }
    #questions-section { display: none; }
  </style>
</head>
<body>

<header>
  <a href="/conversation-starters" class="back-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
  <span class="header-sep">/</span>
  <span class="header-label">Romantic Partner</span>
</header>

<main>
  <h1 class="page-title">Romantic Partner</h1>
  <p class="page-sub">Pick a level. Phones down. One question at a time.</p>

  <p class="section-label">Choose a level</p>
  <div class="level-pills">
    <button class="level-pill" data-level="beginner"  onclick="selectLevel('beginner')">Beginner</button>
    <button class="level-pill" data-level="moderate"  onclick="selectLevel('moderate')">Moderate</button>
    <button class="level-pill" data-level="deep"      onclick="selectLevel('deep')">Deep</button>
    <button class="level-pill spicy" data-level="spicy" onclick="selectLevel('spicy')">Spicy 🔥</button>
  </div>

  <div class="level-desc" id="level-desc"></div>

  <div id="empty-state">
    <p>Select a level above to get your questions.</p>
  </div>

  <div id="questions-section">
    <div class="actions-row">
      <span class="count-text" id="count-text"></span>
      <button class="shuffle-btn" onclick="shuffleQuestions()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        New set
      </button>
    </div>
    <div class="questions-grid" id="questions-grid"></div>
    <div class="container-tip" id="container-tip"></div>
  </div>
</main>

<script>

      "What's something you wish I'd initiate more often?",

      "What's a part of you that loves being wanted — but doesn't always admit it?",

      "How do you like to be looked at when you're feeling desired?",
      "What kind of closeness makes you feel most open to pleasure?",
      "What's one way you like me to lead — and one way you like to lead me?",
      "What would make tonight feel indulgent rather than routine?",
      "What thought about me has turned you on recently that you didn't act on?",

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function selectLevel(level) {
  currentLevel = level;

  document.querySelectorAll('.level-pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.level === level);
  });

  var data = LEVELS[level];
  var descEl = document.getElementById('level-desc');
  descEl.textContent = data.desc;
  descEl.classList.add('visible');

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('questions-section').style.display = 'block';

  var tipEl = document.getElementById('container-tip');
  tipEl.innerHTML = data.tip;
  tipEl.classList.add('visible');

  shuffleQuestions();
}

function shuffleQuestions() {
  if (!currentLevel) return;
  var data = LEVELS[currentLevel];
  var picked = shuffle(data.questions).slice(0, PER_SET);

  var grid = document.getElementById('questions-grid');
  grid.innerHTML = '';
  picked.forEach(function(q, i) {
    var card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = '<div class="q-num">Q' + (i + 1) + '</div><div class="q-text">' + q + '</div>';
    grid.appendChild(card);
  });

  document.getElementById('count-text').textContent =
    'Showing ' + picked.length + ' of ' + data.questions.length + ' questions';
}
</script>

</body>
</html>
