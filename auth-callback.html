<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in… — Proximity Coaching</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.0" integrity="sha384-JWPr1lzjf+jjJ71qGLw1lHMKUHv7yDav6u6Tj3N20nSHfNNxj7XuXL437qT48zOD" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #202023;
      color: #eeeeee;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 32px; max-width: 400px; }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a3d0c9;
      margin-bottom: 32px;
    }
    h2 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 14px; color: #aaa; line-height: 1.6; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333;
      border-top-color: #a3d0c9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #f87171; font-size: 13px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Proximity Coaching</div>
    <h2 id="heading">Signing you in…</h2>
    <div class="spinner" id="spinner"></div>
    <p id="subtext">One moment while we verify your access.</p>
    <p class="error-msg" id="errorMsg">
      Something went wrong. Please return to your email and click the link again,
      or <a href="https://proximitycoaching.com" style="color:#a3d0c9;">contact support</a>.
    </p>
  </div>

  <script>
    // ─── Config ──────────────────────────────────────────────────────────────
    var SUPABASE_URL     = "https://osywbzzvsfjdvjhjalju.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zeXdienp2c2ZqZHZqaGphbGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODM4NjYsImV4cCI6MjA4OTI1OTg2Nn0.tk2YKaEmNoFljeR7BSx6OQZOcOwuMw2osUFSmtdjxAA";

    // coach_id from Stripe product metadata → destination path on proximitycoaching.com
    var COACH_ROUTES = {
      "inner-leadership": "/proxi-he",
      "inner-journey":    "/proxi-she",
      "couples":          "/proxi-we",
      "bundle":           "/proxi-he"   // bundle → men's coach as primary
    };

    // ─── Read coach param from URL ────────────────────────────────────────────
    var urlParams   = new URLSearchParams(window.location.search);
    var coachId     = urlParams.get("coach") || "inner-leadership";
    // Explicitly validate destination is always a known relative path — prevents open redirect
    var destination = COACH_ROUTES.hasOwnProperty(coachId) ? COACH_ROUTES[coachId] : "/proxi-he";
    // Belt-and-suspenders: strip any destination that isn't a simple /path
    if (typeof destination !== "string" || !/^\/[a-z-]+$/.test(destination)) {
      destination = "/proxi-he";
    }

    // ─── Init Supabase ────────────────────────────────────────────────────────
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var redirected = false;

    function goToCoach() {
      if (redirected) return;
      redirected = true;
      document.getElementById("heading").textContent  = "Access granted!";
      document.getElementById("subtext").textContent  = "Taking you to your coach…";
      document.getElementById("spinner").style.borderTopColor = "#a3d0c9";
      // Small delay so user sees the success state before the page changes
      setTimeout(function() {
        window.location.href = destination;
      }, 600);
    }

    function showError() {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("heading").textContent   = "Link expired or invalid";
      document.getElementById("subtext").style.display = "none";
      document.getElementById("errorMsg").style.display = "block";
    }

    // ─── Listen for magic-link sign-in ────────────────────────────────────────
    sb.auth.onAuthStateChange(function(event, session) {
      if ((event === "SIGNED_IN" || event === "TOKEN_REFRESHED") && session) {
        // Clean the hash from the URL before redirecting
        if (window.history && window.history.replaceState) {
          history.replaceState(null, "", window.location.pathname + window.location.search);
        }
        goToCoach();
      }
    });

    // ─── Also check for an already-valid session (e.g. user re-opens link) ───
    sb.auth.getSession().then(function(result) {
      if (result.data && result.data.session) {
        goToCoach();
      }
    });

    // ─── Safety fallback — if nothing fires after 8 seconds, show error ───────
    setTimeout(function() {
      if (!redirected) {
        showError();
      }
    }, 8000);
  </script>
</body>
</html>
