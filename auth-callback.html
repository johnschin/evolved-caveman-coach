<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing you in — Proximity Coaching</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --slate-plum:  #4e4a55;
      --smoke-plum:  #6e6873;
      --linen-white: #faf6ef;
      --warm-cream:  #f0ebe2;
      --soft-aqua:   #afc9cf;
      --dusty-mauve: #998193;
    }

    html, body {
      height: 100%;
      background: var(--warm-cream);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: var(--slate-plum);
    }

    .center {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      background: var(--linen-white);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(78,74,85,0.08);
    }

    .wordmark {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--dusty-mauve);
      font-weight: 600;
      margin-bottom: 32px;
    }

    /* Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(78,74,85,0.15);
      border-top-color: var(--slate-plum);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      font-size: 16px;
      color: var(--slate-plum);
      font-weight: 500;
      line-height: 1.5;
    }

    .sub-text {
      font-size: 13px;
      color: var(--smoke-plum);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* Error state */
    .error-icon {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--slate-plum);
      margin-bottom: 12px;
    }

    .error-body {
      font-size: 14px;
      color: var(--smoke-plum);
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      padding: 13px 28px;
      background: var(--slate-plum);
      color: var(--linen-white);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    #loading-state  { display: flex; flex-direction: column; align-items: center; }
    #error-state    { display: none; }
  </style>
</head>
<body>
  <div class="center">
    <div class="card">
      <p class="wordmark">Proximity Coaching</p>

      <!-- Loading state (default) -->
      <div id="loading-state">
        <div class="spinner"></div>
        <p class="status-text">Signing you in&hellip;</p>
        <p class="sub-text">Just a moment while we verify your access.</p>
      </div>

      <!-- Error state -->
      <div id="error-state">
        <div class="error-icon">&#9888;&#65039;</div>
        <h1 class="error-title">That link has expired.</h1>
        <p class="error-body">
          Magic links are valid for 24&nbsp;hours and can only be used once.
          Check your inbox for a newer link, or contact
          <a href="mailto:hello@proximitycoaching.com" style="color:var(--slate-plum);">hello@proximitycoaching.com</a>
          for help.
        </p>
        <a href="/" class="btn">Back to Proximity Coaching</a>
      </div>
    </div>
  </div>

  <!-- Supabase JS — same version pinned in proxi-he.html -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.0/dist/umd/supabase.js"
          integrity="sha384-C+GzSWARbHRqstqOtMEm9CRlHqVwKkk5SOqv9sB1JN9hXbskmjPO3GkJDxhbsQe"
          crossorigin="anonymous"></script>

  <script>
  // ─────────────────────────────────────────────────────────────────────────────
  //  auth-callback.html
  //
  //  Handles Supabase magic link redirects after email click.
  //
  //  Flow:
  //    1. User clicks magic link in email
  //    2. Supabase redirects here: /auth/callback?coach=<id>#access_token=...
  //    3. This page calls supabase.auth.getSession() — Supabase auto-picks up
  //       tokens from the URL hash and stores the session in localStorage
  //    4. We validate the ?coach= param against a whitelist
  //    5. Redirect to the correct coach app page
  //
  //  Coach routing:
  //    inner-leadership  →  /home-he   (Proxi He home screen)
  //    inner-journey     →  /proxi-she
  //    couples           →  /proxi-we
  //    bundle            →  /proxi-all
  //
  //  Security: open-redirect protection via VALID_ROUTES whitelist.
  //  Any unrecognised ?coach= value falls back to DEFAULT_ROUTE.
  // ─────────────────────────────────────────────────────────────────────────────

  var SUPABASE_URL     = "https://osywbzzvsfjdvjhjalju.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zeXdienp2c2ZqZHZqaGphbGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODM4NjYsImV4cCI6MjA4OTI1OTg2Nn0.tk2YKaEmNoFljeR7BSx6OQZOcOwuMw2osUFSmtdjxAA";

  // Whitelist: coach param value → app route
  // Only these exact routes are valid redirect targets (open-redirect protection)
  var VALID_ROUTES = {
    "inner-leadership": "/home-he",
    "inner-journey":    "/proxi-she",
    "couples":          "/proxi-we",
    "bundle":           "/proxi-all"
  };

  var DEFAULT_ROUTE = "/home-he";

  function showError() {
    document.getElementById("loading-state").style.display = "none";
    document.getElementById("error-state").style.display = "block";
  }

  async function handleCallback() {
    try {
      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Supabase automatically picks up #access_token / #refresh_token from URL hash
      var result = await sb.auth.getSession();
      var session = result.data && result.data.session;

      if (!session) {
        console.error("auth-callback: no session after getSession()", result.error);
        showError();
        return;
      }

      // Validate the coach param — never use raw URL values in a redirect
      var rawCoach = new URLSearchParams(window.location.search).get("coach") || "";
      var destination = VALID_ROUTES[rawCoach];

      if (!destination) {
        if (rawCoach) {
          console.warn("auth-callback: unknown coach param '" + rawCoach + "' — falling back to default");
        }
        destination = DEFAULT_ROUTE;
      }

      // Clear the hash fragment (contains auth tokens) before redirecting
      history.replaceState(null, "", window.location.pathname + window.location.search);

      console.log("auth-callback: session established, routing to", destination);
      window.location.replace(destination);

    } catch (err) {
      console.error("auth-callback: unexpected error", err);
      showError();
    }
  }

  // Give the Supabase client a tick to initialise, then run
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", handleCallback);
  } else {
    handleCallback();
  }
  </script>
</body>
</html>
